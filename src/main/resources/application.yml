server:
  port: 8080
spring:
  application:
    name: jie-ai-agent
  profiles:
    active: dev
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3.7-max
      embedding:
        options:
          model: text-embedding-v4
#开启MCP
#    mcp:
#      client:
#        stdio:
#          servers-configuration: classpath:mcp-servers.json
  datasource:
    mysql:
      jdbc-url: jdbc:mysql://localhost:3306/memory?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password: 123456
      driver-class-name: com.mysql.cj.jdbc.Driver
    pg:
      jdbc-url: jdbc:postgresql://localhost:5432/vector
      username: postgres
      password: 123456
      driver-class-name: org.postgresql.Driver
# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.jiege.jieaiagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
# searchAPI
search-api:
  # 需要替换为你自己的 key
  api-key:
# 修改日志级别，查看 Spring AI 更多调用细节
logging:
  level:
    org.springframework.ai: DEBUG
    com.jige.jieaiagent.mapper: DEBUG